stages:
  - build
  - release

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUST_VERSION: "stable"

# Cache Rust dependencies
.cache_rust: &cache_rust
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - target/
      - .cargo/

# Build for Linux x86_64
build:linux:x86_64:
  stage: build
  image: rust:latest
  <<: *cache_rust
  script:
    - apt-get update && apt-get install -y build-essential libx11-dev libxrandr-dev libxext-dev pkg-config
    - cargo build --release --bin agent
    - mkdir -p release
    - strip target/release/agent -o release/agent
    - tar czf agent-rust-linux-x86_64.tar.gz -C release agent
    - md5sum agent-rust-linux-x86_64.tar.gz > checksums.txt
  artifacts:
    paths:
      - agent-rust-linux-x86_64.tar.gz
      - checksums.txt
    expire_in: 1 week
  tags:
    - docker

# Build for macOS x86_64 (cross-compile)
build:macos:x86_64:
  stage: build
  image: rust:latest
  <<: *cache_rust
  script:
    - apt-get update && apt-get install -y build-essential
    - rustup target add x86_64-apple-darwin
    - cargo build --release --bin agent --target x86_64-apple-darwin
    - mkdir -p release
    - cp target/x86_64-apple-darwin/release/agent release/agent
    - tar czf agent-rust-macos-x86_64.tar.gz -C release agent
    - md5sum agent-rust-macos-x86_64.tar.gz >> checksums.txt
  artifacts:
    paths:
      - agent-rust-macos-x86_64.tar.gz
      - checksums.txt
    expire_in: 1 week
  tags:
    - docker
  allow_failure: true

# Build for macOS ARM64 (Apple Silicon)
build:macos:arm64:
  stage: build
  image: rust:latest
  <<: *cache_rust
  script:
    - apt-get update && apt-get install -y build-essential
    - rustup target add aarch64-apple-darwin
    - cargo build --release --bin agent --target aarch64-apple-darwin
    - mkdir -p release
    - cp target/aarch64-apple-darwin/release/agent release/agent
    - tar czf agent-rust-macos-arm64.tar.gz -C release agent
    - md5sum agent-rust-macos-arm64.tar.gz >> checksums.txt
  artifacts:
    paths:
      - agent-rust-macos-arm64.tar.gz
      - checksums.txt
    expire_in: 1 week
  tags:
    - docker
  allow_failure: true

# Build for Windows x64 (cross-compile)
build:windows:x64:
  stage: build
  image: rust:latest
  <<: *cache_rust
  script:
    - apt-get update && apt-get install -y build-essential
    - rustup target add x86_64-pc-windows-gnu
    - cargo build --release --bin agent --target x86_64-pc-windows-gnu
    - mkdir -p release
    - cp target/x86_64-pc-windows-gnu/release/agent.exe release/agent.exe
    - zip -r agent-rust-windows-x64.zip release/agent.exe
    - md5sum agent-rust-windows-x64.zip >> checksums.txt
  artifacts:
    paths:
      - agent-rust-windows-x64.zip
      - checksums.txt
    expire_in: 1 week
  tags:
    - docker
  allow_failure: true

# Create GitLab Release
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  dependencies:
    - build:linux:x86_64
    - build:macos:x86_64
    - build:macos:arm64
    - build:windows:x64
  script:
    - echo "Creating release for tag $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: |
      ## Employee Monitoring Agent - Release $CI_COMMIT_TAG

      ### Downloads
      - **Linux x86_64**: [agent-rust-linux-x86_64.tar.gz](https://gitlab.ajari.app/ridwanajari/agent-emp/-/releases/$CI_COMMIT_TAG/downloads/agent-rust-linux-x86_64.tar.gz)
      - **macOS x86_64**: [agent-rust-macos-x86_64.tar.gz](https://gitlab.ajari.app/ridwanajari/agent-emp/-/releases/$CI_COMMIT_TAG/downloads/agent-rust-macos-x86_64.tar.gz)
      - **macOS ARM64**: [agent-rust-macos-arm64.tar.gz](https://gitlab.ajari.app/ridwanajari/agent-emp/-/releases/$CI_COMMIT_TAG/downloads/agent-rust-macos-arm64.tar.gz)
      - **Windows x64**: [agent-rust-windows-x64.zip](https://gitlab.ajari.app/ridwanajari/agent-emp/-/releases/$CI_COMMIT_TAG/downloads/agent-rust-windows-x64.zip)

      ### Installation
      See [INSTALLATION.md](https://gitlab.ajari.app/ridwanajari/agent-emp/-/blob/main/docs/INSTALLATION.md) for detailed instructions.

      ### Quick Install (Linux)
      ```bash
      wget https://gitlab.ajari.app/ridwanajari/agent-emp/-/releases/$CI_COMMIT_TAG/download/agent-rust-linux-x86_64.tar.gz
      tar xzf agent-rust-linux-x86_64.tar.gz
      cd agent-rust-linux-x86_64
      sudo ./scripts/install-simple.sh http://your-server:8080
      ```
    assets:
      links:
        - name: "agent-rust-linux-x86_64.tar.gz"
          url: "https://gitlab.ajari.app/ridwanajari/agent-emp/-/releases/$CI_COMMIT_TAG/downloads/agent-rust-linux-x86_64.tar.gz"
          link_type: "package"
        - name: "agent-rust-macos-x86_64.tar.gz"
          url: "https://gitlab.ajari.app/ridwanajari/agent-emp/-/releases/$CI_COMMIT_TAG/downloads/agent-rust-macos-x86_64.tar.gz"
          link_type: "package"
        - name: "agent-rust-macos-arm64.tar.gz"
          url: "https://gitlab.ajari.app/ridwanajari/agent-emp/-/releases/$CI_COMMIT_TAG/downloads/agent-rust-macos-arm64.tar.gz"
          link_type: "package"
        - name: "agent-rust-windows-x64.zip"
          url: "https://gitlab.ajari.app/ridwanajari/agent-emp/-/releases/$CI_COMMIT_TAG/downloads/agent-rust-windows-x64.zip"
          link_type: "package"
  rules:
    - if: $CI_COMMIT_TAG
  tags:
    - docker
