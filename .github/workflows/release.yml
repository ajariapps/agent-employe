name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_HOME: ${{ github.workspace }}/.cargo
  RUST_VERSION: stable

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libx11-dev libxrandr-dev libxext-dev libxtst-dev libxrender-dev libxfixes-dev libxi-dev pkg-config

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --bin agent

      - name: Create release package
        run: |
          mkdir -p release
          strip target/release/agent -o release/agent
          tar czf agent-rust-linux-x86_64.tar.gz -C release agent
          md5sum agent-rust-linux-x86_64.tar.gz > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-x86_64
          path: |
            agent-rust-linux-x86_64.tar.gz
            checksums.txt

  build-macos-x86_64:
    name: Build macOS x86_64
    runs-on: macos-12
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: x86_64-apple-darwin
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --bin agent --target x86_64-apple-darwin

      - name: Create release package
        run: |
          mkdir -p release
          cp target/x86_64-apple-darwin/release/agent release/agent
          tar czf agent-rust-macos-x86_64.tar.gz -C release agent
          md5sum agent-rust-macos-x86_64.tar.gz >> checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: macos-x86_64
          path: |
            agent-rust-macos-x86_64.tar.gz
          if-no-files-found: error

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-12
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: aarch64-apple-darwin
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --bin agent --target aarch64-apple-darwin

      - name: Create release package
        run: |
          mkdir -p release
          cp target/aarch64-apple-darwin/release/agent release/agent
          tar czf agent-rust-macos-arm64.tar.gz -C release agent
          md5sum agent-rust-macos-arm64.tar.gz >> checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: macos-arm64
          path: |
            agent-rust-macos-arm64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --bin agent

      - name: Create release package
        run: |
          mkdir release
          copy target\release\agent.exe release\agent.exe
          tar -czf agent-rust-windows-x64.tar.gz -C release agent.exe
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: windows-x64
          path: agent-rust-windows-x64.tar.gz
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-macos-x86_64, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux-x86_64/agent-rust-linux-x86_64.tar.gz
            artifacts/linux-x86_64/checksums.txt
            artifacts/macos-x86_64/agent-rust-macos-x86_64.tar.gz
            artifacts/macos-arm64/agent-rust-macos-arm64.tar.gz
            artifacts/windows-x64/agent-rust-windows-x64.tar.gz
          generate_release_notes: true
          body: |
            ## Employee Monitoring Agent - ${{ github.ref_name }}

            ### Installation

            See [INSTALLATION.md](https://github.com/ajariapps/agent-employe/blob/main/docs/INSTALLATION.md) for detailed instructions.

            ### Quick Install (Linux)
            ```bash
            wget https://github.com/ajariapps/agent-employe/releases/latest/download/agent-rust-linux-x86_64.tar.gz
            tar xzf agent-rust-linux-x86_64.tar.gz
            sudo ./install-simple.sh http://your-server:8080
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
